let syncTimer=null;

// ── SYNC ──────────────────────────────────────────────────────
function setSyncStatus(status,msg){
  const dot=document.getElementById("sync-dot");
  const txt=document.getElementById("sync-txt");
  if(!dot||!txt)return;
  dot.className="sync-dot "+(status==="ok"?"sync-ok":status==="err"?"sync-err":"sync-load");
  txt.textContent=msg;
}

async function fetchDB(){
  setSyncStatus("load","Synchronisation...");
  try{
    const r=await fetch(GAS_URL);
    if(!r.ok)throw new Error("HTTP "+r.status);
    const remote=await r.json();
    const remoteDB=Object.assign({pronos:{},real:{}},remote||{});

    // Fusion intelligente : on garde les pronostics locaux du joueur courant
    // et on prend les données distantes pour tous les autres
    const merged={pronos:{},real:{}};

    // 1. Partir de la base distante
    merged.real=Object.assign({},remoteDB.real||{});

    // 2. Copier tous les pronostics distants
    Object.keys(remoteDB.pronos||{}).forEach(mid=>{
      merged.pronos[mid]=Object.assign({},remoteDB.pronos[mid]||{});
    });

    // 3. Préserver les pronostics locaux du joueur courant (non encore sauvegardés)
    const localRaw=localStorage.getItem("wc26_cache");
    if(localRaw){
      const local=JSON.parse(localRaw);
      Object.keys(local.pronos||{}).forEach(mid=>{
        if(!merged.pronos[mid])merged.pronos[mid]={};
        // Pour chaque joueur dans les données locales
        Object.keys(local.pronos[mid]||{}).forEach(pi=>{
          const localProno=local.pronos[mid][pi];
          const remoteProno=(remoteDB.pronos[mid]||{})[pi];
          // Garder le local s'il est plus récent (non vide) ou si le distant est vide
          if(localProno&&(localProno.h!==""||localProno.a!=="")&&
             (!remoteProno||remoteProno.h===""||remoteProno.h===undefined)){
            merged.pronos[mid][pi]=localProno;
          }
        });
      });
    }

    DB=merged;
    localStorage.setItem("wc26_cache",JSON.stringify(DB));
    setSyncStatus("ok","Synchronisé ✓");
    return true;
  }catch(e){
    setSyncStatus("err","Hors ligne — données locales");
    const local=localStorage.getItem("wc26_cache");
    if(local)DB=JSON.parse(local);
    return false;
  }
}

async function pushDB(){
  if(syncing)return;
  syncing=true;
  setSyncStatus("load","Sauvegarde...");
  try{
    localStorage.setItem("wc26_cache",JSON.stringify(DB));
    const r=await fetch(GAS_URL,{method:"POST",headers:HEADERS,body:JSON.stringify(DB)});
    if(!r.ok)throw new Error("HTTP "+r.status);
    setSyncStatus("ok","Sauvegardé ✓");
  }catch(e){
    setSyncStatus("err","Erreur de sauvegarde");
  }finally{syncing=false;}
}

function schedulePush(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(pushDB,800);
}

// Auto-refresh toutes les 20s — bloqué 10s après une saisie
setInterval(async()=>{
  if(Date.now()-lastInputTime<10000)return; // Ne pas rafraîchir pendant la saisie
  if(curTab==="pronos"||curTab==="dash"){
    await fetchDB();
    if(curTab==="pronos")renderPronos();
    else renderDash();
  }
},20000);

// ── SCORING ───────────────────────────────────────────────────
function pts(pi,mid){
  const p=((DB.pronos[mid]||{})[pi])||{};
  const r=DB.real[mid]||{};
  const ph=parseInt(p.h),pa=parseInt(p.a),rh=parseInt(r.h),ra=parseInt(r.a);
  if([ph,pa,rh,ra].some(isNaN))return null;
  if(ph===rh&&pa===ra)return 3;
  const pw=ph>pa?"h":ph<pa?"a":"d",rw=rh>ra?"h":rh<ra?"a":"d";
  return pw===rw?1:0;
}
function totals(){
  return PLAYERS.map((pl,pi)=>{
    let p=0,e=0,g=0;
    allM().forEach(m=>{const v=pts(pi,m.id);if(v===3){p+=3;e++;}else if(v===1){p++;g++;}});
    return{...pl,pi,p,e,g};
  }).sort((a,b)=>b.p-a.p);
}

// ── VERROUILLAGE PRONOSTIC ────────────────────────────────────
async function lockProno(mid){
  const pi=myPlayer;
  const prono=(DB.pronos[mid]||{})[pi]||{};
  if(prono.h===""||prono.h===undefined||prono.a===""||prono.a===undefined){
    showToast("⚠️ Entrez un score avant de confirmer");
    return;
  }
  if(!confirm(`Confirmer le pronostic ${prono.h} – ${prono.a} ? Il ne pourra plus être modifié !`))return;
  if(!DB.pronos[mid])DB.pronos[mid]={};
  if(!DB.pronos[mid][pi])DB.pronos[mid][pi]={};
  DB.pronos[mid][pi].locked=true;
  localStorage.setItem("wc26_cache",JSON.stringify(DB));
  await pushDB();
  renderPronos();
  showToast("🔒 Pronostic verrouillé ✓");
}

// Timestamp dernière saisie — bloque le refresh auto pendant 10s après saisie
let lastInputTime=0;

function onScore(el){
  const{mid,side}=el.dataset;
  const pi=myPlayer;
  // Bloquer si verrouillé
  if((DB.pronos[mid]||{})[pi]?.locked===true){
    el.value=((DB.pronos[mid]||{})[pi]||{})[side]??"";
    showToast("🔒 Pronostic verrouillé — modification impossible");
    return;
  }
  if(!DB.pronos[mid])DB.pronos[mid]={};
  if(!DB.pronos[mid][pi])DB.pronos[mid][pi]={};
  DB.pronos[mid][pi][side]=el.value===""?"":parseInt(el.value);
  // Sauvegarde locale immédiate — protège contre le refresh
  localStorage.setItem("wc26_cache",JSON.stringify(DB));
  lastInputTime=Date.now();
  // update pts display inline
  const v=pts(pi,mid);
  const card=document.getElementById("mc-"+mid);
  if(card){
    const pd=card.querySelector(".pts-display");
    if(pd){
      if(v===3){pd.className="pts-display pts-exact";pd.textContent="⭐ Score exact — 3 points !";if(!pd.dataset.fw){pd.dataset.fw="1";launchFirework();}}
      else if(v===1){pd.className="pts-display pts-good";pd.textContent="✓ Bon résultat — 1 point";delete pd.dataset?.fw;}
      else if(v===0){pd.className="pts-display pts-zero";pd.textContent="✗ 0 point";delete pd?.dataset?.fw;}
      else{pd.className="pts-display pts-empty";pd.textContent="Entrez votre pronostic";}
    }
  }
  schedulePush();
}

function openModal(mid){
  curModal=mid;
  const m=allM().find(x=>x.id===mid);
  const r=DB.real[mid]||{};
  document.getElementById("modal-root").innerHTML=`
    <div class="modal-bg" onclick="bgClose(event)">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-ttl">Résultat officiel</div>
        <div class="modal-sub">${m.home} ${m.hN} &nbsp;vs&nbsp; ${m.aN} ${m.away}</div>
        <div class="modal-score-row">
          <div class="modal-team">
            <div class="modal-team-name">${m.hN}</div>
            <input class="modal-in" id="mod-h" type="number" inputmode="numeric" pattern="[0-9]*" min="0" max="30" value="${r.h??""}" placeholder="0">
          </div>
          <span class="modal-dash">–</span>
          <div class="modal-team">
            <div class="modal-team-name">${m.aN}</div>
            <input class="modal-in" id="mod-a" type="number" inputmode="numeric" pattern="[0-9]*" min="0" max="30" value="${r.a??""}" placeholder="0">
          </div>
        </div>
        <div class="modal-btns">
          <button class="btn-cancel" onclick="closeModal()">Annuler</button>
          <button class="btn-confirm" onclick="saveReal()"><i class="ti ti-check"></i>Confirmer</button>
        </div>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById("mod-h")?.focus(),100);
}
function bgClose(e){if(e.target===e.currentTarget)closeModal();}
function closeModal(){document.getElementById("modal-root").innerHTML="";curModal=null;}
async function saveReal(){
  const h=document.getElementById("mod-h")?.value;
  const a=document.getElementById("mod-a")?.value;
  if(h!==""&&h!==undefined&&a!==""&&a!==undefined){
    DB.real[curModal]={h:parseInt(h),a:parseInt(a)};
    closeModal();
    renderPronos();
    if(PLAYERS.some((_,pi)=>pts(pi,curModal)===3))launchFirework();
    await pushDB();
    showToast("Résultat enregistré ✓");
  } else closeModal();
}

                style="width:38px;height:38px;text-align:center;font-size:16px;font-weight:700;border:1.5px solid #e0e0e0;border-radius:8px;background:#f9f9f9;color:#1a1a1a;-moz-appearance:textfield"
                oninput="updateReal('${m.id}','h',this.value)">
              <span style="font-size:13px;color:#ccc">–</span>
              <input type="number" inputmode="numeric" min="0" max="30" value="${r.a??""}" placeholder="–"
                style="width:38px;height:38px;text-align:center;font-size:16px;font-weight:700;border:1.5px solid #e0e0e0;border-radius:8px;background:#f9f9f9;color:#1a1a1a;-moz-appearance:textfield"
                oninput="updateReal('${m.id}','a',this.value)">
            </div>
          </div>`;
        }).join("")}
      `).join("")}
      <button onclick="pushDB().then(()=>showToast('Résultats sauvegardés ✓'))" style="width:100%;padding:13px;background:#1a1a2e;border:none;border-radius:10px;font-size:14px;font-weight:600;color:#f5a623;cursor:pointer;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:7px">
        <i class="ti ti-cloud-upload" style="font-size:18px"></i>Sauvegarder tous les résultats
      </button>
    </div>

    <!-- INFOS -->
    <div style="background:#f0f4ff;border-radius:14px;padding:14px;box-shadow:0 0 0 1px #c7d7fc">
      <div style="font-size:12px;font-weight:700;color:#1e40af;margin-bottom:6px;display:flex;align-items:center;gap:5px">
        <i class="ti ti-info-circle" style="font-size:15px"></i>Synchronisation
      </div>
      <div style="font-size:11px;color:#3b5bdb;line-height:1.7">
        Base : Google Apps Script · Refresh auto 20s<br>
        Bin ID : <code style="background:#dbe4ff;padding:1px 5px;border-radius:4px;font-size:10px">AKfycbwVagyvYv9gHiG-DbEXdUdUmA2w98e97tUcuO9fMpON1t0sOm07kTR4n04_KAMdnn3zgQ</code><br>
        7 pronostiqueurs · 31 matchs au total
      </div>
    </div>
  </div>`;
}

function updateReal(mid,side,val){
  if(!DB.real[mid])DB.real[mid]={};
  DB.real[mid][side]=val===""?"":parseInt(val);
  localStorage.setItem("wc26_cache",JSON.stringify(DB));
}

async function resetPhase(){
  if(!confirm("Effacer tous les pronostics ? Les résultats officiels seront conservés."))return;
  DB.pronos={};
  localStorage.setItem("wc26_cache",JSON.stringify(DB));
  await pushDB();
  renderAdmin();
  showToast("Pronostics effacés ✓");
}

async function resetAll(){
  if(!confirm("Tout effacer ? Pronostics ET résultats. Action irréversible !"))return;
  DB={pronos:{},real:{}};
  localStorage.setItem("wc26_cache",JSON.stringify(DB));
  await pushDB();
  renderAdmin();
  showToast("Réinitialisé ✓");
}

// ── FIREWORK ──────────────────────────────────────────────────
function launchFirework(){
  const c=document.getElementById("fw-container");
  if(!c)return;
  const cols=["#eda100","#2a78d6","#1baf7a","#e34948","#4a3aa7","#008300","#eb6834","#fff"];
  for(let i=0;i<28;i++){
    const p=document.createElement("div");
    p.className="fw-p";
    const sz=5+Math.random()*7;
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};left:${Math.random()*100}vw;top:${Math.random()*50}vh`;
    c.appendChild(p);
    const tx=(Math.random()-.5)*220,ty=80+Math.random()*220;
    p.animate([{opacity:1,transform:"translate(0,0) scale(1)"},{opacity:0,transform:`translate(${tx}px,${ty}px) scale(0)`}],{duration:900+Math.random()*400,easing:"cubic-bezier(.2,.8,.3,1)"}).onfinish=()=>p.remove();
  }
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

// ── INSTALL BANNER ────────────────────────────────────────────
function showInstallBanner(){
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const isAndroid=/Android/.test(navigator.userAgent);
  const el=document.getElementById("install-zone");
  if(isIOS&&!navigator.standalone){
    el.innerHTML=`<div class="install-banner">
      <i class="ti ti-download" style="font-size:28px;color:#f5a623;flex-shrink:0"></i>
      <div class="install-txt"><strong>Installer l'app</strong>Safari → Partager → Sur l'écran d'accueil</div>
      <button class="install-close" onclick="this.parentElement.remove()">✕</button>
    </div>`;
  } else if(isAndroid){
    el.innerHTML=`<div class="install-banner">
      <i class="ti ti-download" style="font-size:28px;color:#f5a623;flex-shrink:0"></i>
      <div class="install-txt"><strong>Installer l'app</strong>Chrome → ⋮ → Ajouter à l'écran d'accueil</div>
      <button class="install-close" onclick="this.parentElement.remove()">✕</button>
    </div>`;
  }
}

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener("load",async()=>{
  await fetchDB();
  renderPlayerChips();
  renderPronos();
  showInstallBanner();
  setTimeout(()=>{
    document.getElementById("splash").style.opacity="0";
    setTimeout(()=>{
      document.getElementById("splash").style.display="none";
      document.getElementById("app").style.opacity="1";
    },400);
  },1400);
});

window.lockProno=lockProno;
window.switchTab=switchTab;
window.selectPlayer=selectPlayer;
window.openModal=openModal;
window.closeModal=closeModal;
window.bgClose=bgClose;
window.saveReal=saveReal;
window.onScore=onScore;
window.resetPhase=resetPhase;
window.resetAll=resetAll;
window.updateReal=updateReal;
</script>
